model = "gpt-5.4"
model_reasoning_effort = "high"
personality = "pragmatic"

# EigenPhi MCP server is disabled by default.
# To re-enable it, uncomment this block and replace the backend path.
# [mcp_servers."eigenphi-blockchain"]
# command = "/opt/homebrew/bin/go"
# args = ["run", "/absolute/path/to/eigenphi-backend-go/cmd/mcp-server/main.go"]
#
# [mcp_servers."eigenphi-blockchain".env]
# ETH_RPC_URL = "https://ethereum.publicnode.com"

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers."chrome-devtools"]
command = "${NPM_GLOBAL_BIN}/chrome-devtools-mcp"
args = ["--no-usage-statistics", "--no-performance-crux"]

[features]
collaboration_modes = true
codex_hooks = true
